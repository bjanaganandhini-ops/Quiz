<h2>Edit Question</h2>

<form method="POST">

    <input type="text" name="question" value="{{ question.question }}" required><br><br>

    <input type="text" name="option1" value="{{ question.option1 }}" required><br>
    <input type="text" name="option2" value="{{ question.option2 }}" required><br>
    <input type="text" name="option3" value="{{ question.option3 }}" required><br>
    <input type="text" name="option4" value="{{ question.option4 }}" required><br><br>

    <label>Select Correct Option:</label><br>

    <input type="radio" name="correct_option" value="1"
    {% if question.answer == question.option1 %}checked{% endif %}> Option 1<br>

    <input type="radio" name="correct_option" value="2"
    {% if question.answer == question.option2 %}checked{% endif %}> Option 2<br>

    <input type="radio" name="correct_option" value="3"
    {% if question.answer == question.option3 %}checked{% endif %}> Option 3<br>

    <input type="radio" name="correct_option" value="4"
    {% if question.answer == question.option4 %}checked{% endif %}> Option 4<br><br>

    <button type="submit">Update Question</button>

</form>
