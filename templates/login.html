{% extends "layout.html" %}
{% block content %}

<div class="auth-container">
    <div class="auth-card">

        <img src="{{ url_for('static', filename='images/quiz.jpg') }}" alt="" class="logo">

        <h2>Login</h2>

        <form method="POST" class="auth-form">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>

        <div class="switch-links">
            <p>Don't have an account?</p>

            <a href="{{ url_for('register', role='player') }}" class="switch-link">
                Sign up as Student
            </a>

            <a href="{{ url_for('register', role='host') }}" class="switch-link">
                Sign up as Teacher
            </a>
            
        </div>

    </div>
</div>

{% endblock %}
