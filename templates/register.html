{% extends "layout.html" %}
{% block content %}

<div class="auth-card">

    <img src="{{ url_for('static', filename='images/quiz.jpg') }}" class="logo">

    <h2>Create Account</h2>

    <form method="POST">

        <div class="form-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="form-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="role-group">
            <label>
                <input type="radio" name="role" value="player" required> Player
            </label>

            <label>
                <input type="radio" name="role" value="creator"> Quiz Creator
            </label>
        </div>

        <button type="submit" class="btn">Register</button>

    </form>

    <p class="bottom-text">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>

</div>

{% endblock %}
