{% extends "layout.html" %}
{% block content %}

<h2>{{ quiz.title }} - Questions</h2>

{% if quiz.questions %}
    <ul>
        {% for question in quiz.questions %}
            <li>{{ question.question }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>No questions added yet.</p>
{% endif %}

<a href="{{ url_for('dashboard_host') }}">Back</a>

{% endblock %}
